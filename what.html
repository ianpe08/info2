<head>

<body>

<style>
    .sidebar{
        width:250px;
        padding:20px;
        background:#334155cc;
        color:white;
        border-radius:12px;
        transition: .3s;
    }
    .sidebar.oculta{
        width:0;
        padding:0;
        overflow:hidden;
    }
    body{
        font-family:"Lato",sans-serif;
        background: #0f172a;
        margin: 0;
        min-height:100vh;
    }
    .container{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }
</style>
<script>

    const btn = document.querySelector("#btn");

const sidebar = document.querySelector(".sidebar");

btn.addEventListener("click",()=>{

    sidebar.classList.toggle("oculta");

});

</script>
